<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>AquaFlow | ملفي الشخصي</title>
  <link rel="stylesheet" href="./assets/css/style.css"/>
  <script src="./assets/js/config.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <style>
/* ═══════════ DESIGN TOKENS ═══════════ */
:root {
  --ocean:   #0066CC;
  --ocean-d: #004fa3;
  --ocean-l: #338EDB;
  --brand:   #E6A200;
  --brand-d: #c48800;
  --brand-l: #ffbe2e;
  --bg:      #04090f;
  --bg2:     #070f1c;
  --surf:    rgba(255,255,255,.042);
  --surf2:   rgba(255,255,255,.075);
  --bdr:     rgba(255,255,255,.08);
  --tp:  rgba(255,255,255,.96);
  --ts:  rgba(255,255,255,.52);
  --tm:  rgba(255,255,255,.28);
  --ok:  #00e5a0;
  --warn:#ffb547;
  --err: #ff4d6d;
  --cyan:#00c8ff;
  --grad-ocean: linear-gradient(135deg,#00a8ff 0%,#0066CC 55%,#0040a0 100%);
  --grad-brand: linear-gradient(135deg,#ffbe2e 0%,#E6A200 60%,#c48800 100%);
  --r-sm:8px;--r-md:14px;--r-lg:22px;--r-xl:28px;--r-full:9999px;
  --ease: cubic-bezier(.23,1,.32,1);
  --spring: cubic-bezier(.34,1.56,.64,1);
  --fast:160ms;--mid:300ms;
  --f-disp:'Syne',sans-serif;
  --f-body:'Cairo',sans-serif;
}

*, *::before, *::after { box-sizing:border-box;margin:0;padding:0; }
html { scroll-behavior:smooth; }
body {
  font-family:var(--f-body);
  background:var(--bg);
  color:var(--tp);
  min-height:100dvh;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
  direction:rtl;
}
button { cursor:pointer;border:none;background:none;font-family:inherit; }
a { text-decoration:none;color:inherit; }
input,select,textarea { font-family:inherit; }

/* ── BACKGROUND ── */
.bg-mesh {
  position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;
}
.bg-mesh::before {
  content:'';position:absolute;
  width:800px;height:800px;border-radius:50%;
  background:radial-gradient(circle,rgba(0,102,204,.16) 0%,transparent 65%);
  top:-300px;right:-200px;
  animation:drift1 14s ease-in-out infinite alternate;
}
.bg-mesh::after {
  content:'';position:absolute;
  width:600px;height:600px;border-radius:50%;
  background:radial-gradient(circle,rgba(230,162,0,.09) 0%,transparent 60%);
  bottom:-200px;left:-150px;
  animation:drift2 18s ease-in-out infinite alternate;
}
@keyframes drift1{from{transform:translate(0,0)}to{transform:translate(-60px,40px)}}
@keyframes drift2{from{transform:translate(0,0)}to{transform:translate(50px,-30px)}}

.noise {
  position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.025;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:200px;
}

/* ── NAV ── */
.top-nav {
  position:fixed;top:0;inset-inline:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;height:60px;
  background:rgba(4,9,15,.88);
  backdrop-filter:blur(24px);
  border-bottom:1px solid var(--bdr);
}
.nav-brand {
  display:flex;align-items:center;gap:9px;
  font-family:var(--f-disp);font-weight:800;font-size:1.05rem;
}
.nav-brand svg{width:17px;height:17px;color:var(--brand);}
.nav-brand span{
  background:var(--grad-brand);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.nav-link {
  font-size:.8rem;font-weight:600;color:var(--ts);
  display:flex;align-items:center;gap:5px;
  padding:6px 12px;border-radius:var(--r-full);
  border:1px solid var(--bdr);
  transition:all var(--fast);
}
.nav-link:hover{color:var(--tp);border-color:rgba(255,255,255,.16);}
.nav-link svg{width:12px;height:12px;}

/* ── PAGE ── */
.page-wrap {
  min-height:100dvh;
  padding:76px 16px 96px;
  max-width:640px;margin:0 auto;
  position:relative;z-index:1;
}

/* ── HERO CARD ── */
.hero-card {
  border-radius:var(--r-xl);
  overflow:hidden;
  margin-bottom:16px;
  border:1px solid rgba(0,102,204,.2);
  position:relative;
}
.hero-banner {
  height:90px;
  background:linear-gradient(135deg,#001a3d 0%,#003380 40%,#001428 100%);
  position:relative;overflow:hidden;
}
.hero-banner::before {
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(
    45deg,
    transparent,transparent 20px,
    rgba(0,102,204,.06) 20px,rgba(0,102,204,.06) 21px
  );
}
.hero-banner::after {
  content:'';position:absolute;
  width:300px;height:300px;border-radius:50%;
  background:radial-gradient(circle,rgba(230,162,0,.18),transparent 60%);
  top:-100px;left:50%;transform:translateX(-50%);
}
.hero-body {
  background:rgba(255,255,255,.038);
  backdrop-filter:blur(20px);
  padding:0 20px 20px;
  position:relative;
}
.hero-av-wrap {
  display:flex;align-items:flex-end;justify-content:space-between;
  margin-top:-30px;margin-bottom:14px;
}
.hero-av {
  width:62px;height:62px;border-radius:50%;
  background:var(--grad-brand);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--f-disp);font-size:1.5rem;font-weight:800;color:#fff;
  border:3px solid var(--bg);
  box-shadow:0 4px 20px rgba(230,162,0,.35);
  flex-shrink:0;
}
.logout-btn {
  padding:7px 14px;border-radius:var(--r-full);
  font-size:.74rem;font-weight:700;
  color:var(--err);
  background:rgba(255,77,109,.08);
  border:1px solid rgba(255,77,109,.18);
  display:flex;align-items:center;gap:5px;
  transition:all var(--fast);margin-bottom:4px;
}
.logout-btn svg{width:12px;height:12px;}
.logout-btn:hover{background:rgba(255,77,109,.18);}
.hero-name {
  font-family:var(--f-disp);font-size:1.25rem;font-weight:800;
  margin-bottom:2px;
}
.hero-user{font-size:.8rem;color:var(--ts);margin-bottom:5px;}
.hero-meta{display:flex;flex-wrap:wrap;align-items:center;gap:6px;}
.meta-chip {
  display:inline-flex;align-items:center;gap:4px;
  font-size:.68rem;font-weight:700;
  padding:3px 9px;border-radius:var(--r-full);
}
.chip-blue{background:rgba(0,102,204,.14);border:1px solid rgba(0,102,204,.3);color:#60aeff;}
.chip-gold{background:rgba(230,162,0,.12);border:1px solid rgba(230,162,0,.28);color:var(--brand-l);}
.meta-chip svg{width:10px;height:10px;}

/* ── STATS ROW ── */
.stats-row {
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:10px;margin-top:16px;
}
.stat-box {
  background:rgba(255,255,255,.03);
  border:1px solid var(--bdr);
  border-radius:var(--r-md);
  padding:13px 10px;text-align:center;
  position:relative;overflow:hidden;
  transition:border-color var(--fast);
}
.stat-box:hover{border-color:rgba(0,102,204,.3);}
.stat-box::before{
  content:'';position:absolute;top:0;inset-inline:0;height:2px;
  background:var(--grad-ocean);transform:scaleX(0);
  transition:transform var(--mid) var(--ease);transform-origin:right;
}
.stat-box:hover::before{transform:scaleX(1);}
.stat-num {
  font-family:var(--f-disp);font-size:1.8rem;font-weight:800;
  background:var(--grad-brand);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  line-height:1;margin-bottom:4px;
}
.stat-lbl{font-size:.65rem;font-weight:600;color:var(--tm);line-height:1.3;}

/* ── SECTION HEADER ── */
.section-hd {
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:14px;flex-wrap:wrap;gap:8px;
}
.section-title {
  font-family:var(--f-disp);font-size:1rem;font-weight:800;
  display:flex;align-items:center;gap:8px;
}
.section-title svg{width:16px;height:16px;color:var(--brand);}
.add-btn {
  display:inline-flex;align-items:center;gap:5px;
  padding:8px 16px;border-radius:var(--r-full);
  font-size:.75rem;font-weight:800;
  background:var(--grad-brand);
  color:#1a0e00;
  box-shadow:0 4px 14px rgba(230,162,0,.3);
  transition:all var(--fast) var(--spring);
}
.add-btn svg{width:12px;height:12px;}
.add-btn:hover{transform:translateY(-2px);box-shadow:0 8px 22px rgba(230,162,0,.45);}

/* ── SEARCH ── */
.search-wrap {
  position:relative;margin-bottom:14px;
}
.search-wrap svg {
  position:absolute;right:14px;top:50%;transform:translateY(-50%);
  width:15px;height:15px;color:var(--ts);pointer-events:none;
}
.search-wrap input {
  width:100%;height:48px;
  padding:0 44px 0 16px;
  background:rgba(255,255,255,.05);
  border:1px solid var(--bdr);
  border-radius:var(--r-full);
  color:var(--tp);font-size:.88rem;outline:none;direction:rtl;
  transition:border-color var(--mid),box-shadow var(--mid);
}
.search-wrap input:focus{
  border-color:rgba(0,102,204,.45);
  box-shadow:0 0 0 3px rgba(0,102,204,.1);
}
.search-wrap input::placeholder{color:var(--tm);}

/* ── SWIMMER CARD ── */
.sw-card {
  background:rgba(255,255,255,.038);
  border:1px solid var(--bdr);
  border-radius:var(--r-lg);
  margin-bottom:10px;
  overflow:hidden;
  transition:border-color var(--fast),transform var(--fast);
}
.sw-card:hover{
  border-color:rgba(0,102,204,.25);
  transform:translateY(-2px);
}
.sw-header {
  display:flex;align-items:center;gap:12px;
  padding:16px;cursor:pointer;
  user-select:none;
  -webkit-tap-highlight-color:transparent;
}
.sw-av {
  width:46px;height:46px;border-radius:14px;
  background:var(--grad-ocean);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--f-disp);font-weight:800;font-size:1.1rem;color:#fff;
  box-shadow:0 4px 12px rgba(0,102,204,.3);
}
.sw-info{flex:1;min-width:0;}
.sw-name{
  font-family:var(--f-disp);font-weight:700;font-size:.95rem;
  margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.sw-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.sw-id{
  font-size:.72rem;font-weight:700;
  color:var(--ocean-l);
  background:rgba(0,102,204,.1);
  padding:2px 8px;border-radius:var(--r-full);
}
.sw-time{
  font-size:.7rem;color:var(--ts);
  display:flex;align-items:center;gap:3px;
}
.sw-time svg{width:11px;height:11px;color:var(--tm);}
.sw-right{
  display:flex;flex-direction:column;align-items:flex-end;gap:6px;
  flex-shrink:0;
}
.sw-badge{
  font-size:.65rem;font-weight:800;
  padding:3px 9px;border-radius:var(--r-full);
  white-space:nowrap;
}
.b-on{background:rgba(0,229,160,.1);border:1px solid rgba(0,229,160,.25);color:var(--ok);}
.b-off{background:rgba(255,77,109,.08);border:1px solid rgba(255,77,109,.2);color:var(--err);}
.chevron-btn {
  width:28px;height:28px;border-radius:8px;
  background:rgba(255,255,255,.05);
  border:1px solid var(--bdr);
  display:flex;align-items:center;justify-content:center;
  color:var(--ts);
  transition:all var(--fast);
}
.chevron-btn svg{width:14px;height:14px;transition:transform var(--mid) var(--ease);}
.sw-card.open .chevron-btn{
  background:rgba(0,102,204,.14);
  border-color:rgba(0,102,204,.3);
  color:var(--ocean-l);
}
.sw-card.open .chevron-btn svg{transform:rotate(180deg);}

/* ── PROGRESS ── */
.sw-progress{padding:0 16px 14px;}
.prog-labels{display:flex;justify-content:space-between;font-size:.68rem;color:var(--tm);margin-bottom:5px;}
.prog-track{height:5px;border-radius:5px;background:rgba(255,255,255,.07);overflow:hidden;}
.prog-fill{
  height:100%;border-radius:5px;
  background:linear-gradient(90deg,var(--ocean-l),var(--brand));
  transition:width .8s var(--ease);
}

/* ── EXPAND ── */
.sw-expand {
  display:none;
  border-top:1px solid var(--bdr);
  animation:expandIn .25s var(--ease);
}
.sw-expand.open{display:block;}
@keyframes expandIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.expand-inner{padding:16px;}

/* ── INFO BLOCKS ── */
.info-hl {
  display:flex;align-items:center;gap:9px;
  padding:10px 14px;border-radius:var(--r-md);
  background:rgba(0,102,204,.06);
  border:1px solid rgba(0,102,204,.15);
  font-size:.78rem;color:var(--ts);
  margin-bottom:10px;
}
.info-hl svg{width:14px;height:14px;color:var(--ocean-l);flex-shrink:0;}
.info-hl.warn{background:rgba(255,181,71,.06);border-color:rgba(255,181,71,.2);}
.info-hl.warn svg{color:var(--warn);}
.info-hl.err{background:rgba(255,77,109,.06);border-color:rgba(255,77,109,.18);}
.info-hl.err svg{color:var(--err);}

.expiry-pill{
  display:inline-flex;align-items:center;gap:4px;
  font-size:.71rem;font-weight:700;
  padding:2px 8px;border-radius:var(--r-full);
  margin-right:4px;
}
.ep-ok{background:rgba(0,229,160,.1);border:1px solid rgba(0,229,160,.25);color:var(--ok);}
.ep-warn{background:rgba(255,181,71,.1);border:1px solid rgba(255,181,71,.28);color:var(--warn);}
.ep-over{background:rgba(255,77,109,.1);border:1px solid rgba(255,77,109,.22);color:var(--err);}

/* ── LEVEL ── */
.level-box {
  display:flex;align-items:center;gap:12px;
  padding:11px 14px;border-radius:var(--r-md);
  background:rgba(230,162,0,.06);
  border:1px solid rgba(230,162,0,.18);
  margin-bottom:10px;
}
.level-num {
  font-family:var(--f-disp);font-size:1.4rem;font-weight:800;
  background:var(--grad-brand);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  flex-shrink:0;
}
.level-lbl{font-size:.72rem;color:var(--ts);}
.level-note{font-size:.68rem;color:var(--tm);font-style:italic;}

/* ── RATING ── */
.rating-box {
  background:rgba(255,215,0,.04);
  border:1px solid rgba(255,215,0,.12);
  border-radius:var(--r-md);
  padding:12px 14px;
  margin-bottom:10px;
}
.rating-hd{
  display:flex;align-items:center;gap:6px;
  font-size:.76rem;font-weight:700;color:var(--ts);
  margin-bottom:8px;
}
.rating-hd svg{width:13px;height:13px;color:#ffd700;}
.stars-row{display:flex;gap:4px;direction:ltr;}
.star{font-size:1.3rem;color:rgba(255,255,255,.12);}
.star.on{color:#ffd700;text-shadow:0 0 8px rgba(255,215,0,.4);}
.rating-note{font-size:.73rem;color:var(--ts);margin-top:6px;font-style:italic;}
.rating-by{font-size:.65rem;color:var(--tm);margin-top:3px;}
.no-rating{font-size:.74rem;color:var(--tm);font-style:italic;}

/* ── DETAILS GRID ── */
.details-grid {
  display:grid;grid-template-columns:1fr 1fr;gap:8px;
  margin-bottom:12px;
}
.det-item{
  padding:9px 12px;border-radius:var(--r-md);
  background:rgba(255,255,255,.025);
  border:1px solid rgba(255,255,255,.06);
}
.det-l{font-size:.65rem;color:var(--tm);margin-bottom:2px;}
.det-v{font-size:.8rem;font-weight:700;color:var(--tp);}

/* ── ATTENDANCE ── */
.att-section{margin-bottom:12px;}
.att-hd{
  font-size:.78rem;font-weight:700;color:var(--ts);
  margin-bottom:10px;display:flex;align-items:center;gap:6px;
}
.att-hd svg{width:14px;height:14px;color:var(--brand);}
.att-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:12px;}
.ast{
  text-align:center;padding:8px 4px;border-radius:var(--r-md);
}
.ast-num{font-family:var(--f-disp);font-size:1.2rem;font-weight:800;display:block;line-height:1;}
.ast-lbl{font-size:.6rem;font-weight:600;margin-top:2px;display:block;}
.ast-p{background:rgba(0,229,160,.07);border:1px solid rgba(0,229,160,.18);color:var(--ok);}
.ast-a{background:rgba(255,77,109,.07);border:1px solid rgba(255,77,109,.16);color:var(--err);}
.ast-m{background:rgba(255,159,67,.07);border:1px solid rgba(255,159,67,.2);color:#ff9f43;}
.ast-r{background:rgba(0,102,204,.07);border:1px solid rgba(0,102,204,.2);color:var(--ocean-l);}

.cal-nav{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:8px;
}
.cal-nav-btn {
  width:32px;height:32px;border-radius:10px;
  background:rgba(255,255,255,.05);border:1px solid var(--bdr);
  color:var(--ts);display:flex;align-items:center;justify-content:center;
  transition:all var(--fast);font-size:1rem;
}
.cal-nav-btn:hover:not(:disabled){color:var(--ocean-l);border-color:rgba(0,102,204,.3);}
.cal-nav-btn:disabled{opacity:.2;pointer-events:none;}
.cal-month-lbl{font-family:var(--f-disp);font-weight:800;font-size:.88rem;}
.cal-days-hd{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:2px;}
.cal-day-h{text-align:center;font-size:.54rem;font-weight:700;color:var(--tm);padding:2px 0;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.cc{
  min-height:38px;border-radius:7px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  border:1px solid transparent;
}
.cc.empty{background:transparent;border-color:transparent;}
.cc.rest{background:rgba(255,255,255,.012);opacity:.22;}
.cc.upcoming{background:rgba(0,102,204,.04);border-color:rgba(0,102,204,.1);}
.cc.today-c{background:rgba(0,102,204,.16);border-color:rgba(0,102,204,.4);}
.cc.present{background:rgba(0,229,160,.08);border-color:rgba(0,229,160,.28);}
.cc.absent{background:rgba(255,77,109,.09);border-color:rgba(255,77,109,.28);}
.cc.makeup{background:rgba(255,159,67,.09);border-color:rgba(255,159,67,.32);}
.cc-n{font-family:var(--f-disp);font-weight:800;font-size:.7rem;line-height:1;}
.cc.today-c .cc-n{color:#fff;}
.cc.present .cc-n{color:var(--ok);}
.cc.absent  .cc-n{color:var(--err);}
.cc.makeup  .cc-n{color:#ff9f43;}
.cc.upcoming .cc-n{color:var(--tp);}
.cc-ic{font-size:.5rem;font-weight:900;margin-top:1px;}

/* ── ACTIONS ── */
.sw-actions{display:flex;gap:7px;flex-wrap:wrap;margin-top:4px;}
.act-btn {
  padding:8px 14px;border-radius:var(--r-full);
  font-size:.72rem;font-weight:700;
  display:inline-flex;align-items:center;gap:5px;
  transition:all var(--fast);
}
.act-btn svg{width:12px;height:12px;}
.act-edit{
  color:var(--brand-l);
  background:rgba(230,162,0,.08);
  border:1px solid rgba(230,162,0,.2);
}
.act-edit:hover{background:rgba(230,162,0,.18);}

/* ── EMPTY ── */
.no-data{
  text-align:center;padding:52px 20px;color:var(--tm);
}
.no-data svg{width:44px;height:44px;margin:0 auto 14px;display:block;opacity:.25;}
.no-data p{font-size:.9rem;margin-bottom:18px;color:var(--ts);}

/* ── MODAL ── */
.mo {
  position:fixed;inset:0;z-index:150;
  background:rgba(0,0,0,.82);backdrop-filter:blur(16px);
  display:flex;align-items:center;justify-content:center;padding:16px;
  opacity:0;pointer-events:none;transition:opacity var(--mid);
}
.mo.show{opacity:1;pointer-events:all;}
.mo-card {
  width:100%;max-width:460px;
  background:#060e1a;
  border:1px solid rgba(0,102,204,.2);
  border-radius:var(--r-xl);
  padding:24px 20px;
  max-height:88dvh;overflow-y:auto;
  position:relative;
  transform:translateY(16px);transition:transform var(--mid) var(--ease);
}
.mo.show .mo-card{transform:translateY(0);}
.mo-card::before{
  content:'';position:absolute;top:0;inset-inline:0;height:2px;
  background:var(--grad-ocean);border-radius:var(--r-xl) var(--r-xl) 0 0;
}
.mo-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.mo-title{
  font-family:var(--f-disp);font-size:.98rem;font-weight:800;
  display:flex;align-items:center;gap:7px;
}
.mo-title svg{width:14px;height:14px;color:var(--brand);}
.mo-close{
  width:28px;height:28px;border-radius:50%;
  background:rgba(255,255,255,.06);
  display:flex;align-items:center;justify-content:center;
  color:var(--ts);transition:all var(--fast);
}
.mo-close:hover{background:rgba(255,77,109,.14);color:var(--err);}
.mo-close svg{width:12px;height:12px;}

/* ── FORM CONTROLS ── */
.fc {
  width:100%;height:50px;padding:0 16px;
  background:rgba(255,255,255,.05);
  border:1px solid var(--bdr);
  border-radius:var(--r-md);
  color:var(--tp);font-size:.9rem;font-weight:500;
  outline:none;direction:rtl;
  transition:border-color var(--mid),box-shadow var(--mid);
}
.fc:focus{
  border-color:rgba(0,102,204,.5);
  box-shadow:0 0 0 3px rgba(0,102,204,.1);
}
.fc::placeholder{color:var(--tm);}
select.fc{cursor:pointer;}
select.fc option{background:#060e1a;}
.field{display:flex;flex-direction:column;gap:6px;}
.field label{font-size:.76rem;font-weight:700;color:var(--ts);}
.form-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media(max-width:420px){.form-grid-2{grid-template-columns:1fr;}}

.btn-save {
  width:100%;height:50px;border-radius:var(--r-md);
  background:var(--grad-brand);
  color:#1a0e00;font-size:.92rem;font-weight:800;
  display:flex;align-items:center;justify-content:center;gap:8px;
  box-shadow:0 6px 20px rgba(230,162,0,.32);
  margin-top:14px;
  transition:transform var(--fast) var(--spring),box-shadow var(--fast);
}
.btn-save:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(230,162,0,.48);}
.btn-save.loading{opacity:.6;pointer-events:none;}

/* ── BOTTOM NAV ── */
.bottom-nav {
  position:fixed;bottom:20px;
  left:50%;transform:translateX(-50%);
  z-index:100;
  display:flex;align-items:center;gap:6px;
  padding:10px 16px;border-radius:var(--r-full);
  background:rgba(6,14,26,.92);backdrop-filter:blur(22px);
  border:1px solid var(--bdr);
  box-shadow:0 8px 32px rgba(0,0,0,.5);
}
.nav-icon {
  width:44px;height:44px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  color:var(--ts);transition:all var(--fast);
}
.nav-icon svg{width:20px;height:20px;}
.nav-icon:hover{color:var(--tp);background:var(--surf2);}
.nav-icon.active{color:var(--brand-l);}
.center-plus {
  width:52px;height:52px;
  background:var(--grad-brand);
  color:#1a0e00 !important;
  box-shadow:0 4px 18px rgba(230,162,0,.4);
  border-radius:50%;
}
.center-plus:hover{transform:scale(1.08);box-shadow:0 8px 28px rgba(230,162,0,.6) !important;}

/* ── TOAST ── */
.toast {
  position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(12px);
  z-index:400;display:flex;align-items:center;gap:9px;
  padding:10px 22px;border-radius:var(--r-full);
  font-size:.84rem;font-weight:700;backdrop-filter:blur(20px);
  opacity:0;pointer-events:none;
  transition:opacity var(--mid),transform var(--mid);
  white-space:nowrap;
}
.toast.ok {background:rgba(0,229,160,.12);border:1px solid rgba(0,229,160,.3);color:var(--ok);}
.toast.er {background:rgba(255,77,109,.12);border:1px solid rgba(255,77,109,.3);color:var(--err);}
.toast.inf{background:rgba(0,102,204,.12);border:1px solid rgba(0,102,204,.3);color:var(--ocean-l);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

@keyframes spin{to{transform:rotate(360deg)}}

/* ── RESPONSIVE ── */
@media(max-width:360px){
  .stats-row{grid-template-columns:1fr 1fr;}
  .stat-box:last-child{grid-column:1/-1;}
  .details-grid{grid-template-columns:1fr;}
  .att-stats{grid-template-columns:repeat(2,1fr);}
}
  </style>
</head>

<div class="page-wrap">

          <option value="">—</option>

<script>
const API    = 'https://backend-mohsen-swimming-academy.vercel.app/api';
const GOALS  = {fitness:'اللياقة البدنية',competition:'المنافسات',safety:'الأمان في الماء',fun:'الترفيه'};
const DAYS   = ['أحد','اثنين','ثلاثاء','أربعاء','خميس','جمعة','سبت'];
const MONTHS = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];

let token=null, user=null, swimmers=[], editId=null;
const calState = {};

document.addEventListener('DOMContentLoaded',()=>{
  lucide.createIcons();
  token=localStorage.getItem('sw_token');
  if(!token){window.location.href='auth.html';return;}
  try{user=JSON.parse(localStorage.getItem('sw_user'));}catch(e){}
  renderHero(); loadSwimmers(); bindUI();
});

function renderHero(){
  if(!user) return;
  const name=user.displayName||'', uname=user.username||'';
  $('profAv').textContent=(name||uname).charAt(0).toUpperCase();
  $('profName').textContent=name||uname;
  $('profUser').textContent='@'+uname;
  const created=user.createdAt?new Date(user.createdAt):null;
  if(created){
    const days=Math.floor((Date.now()-created.getTime())/(1000*60*60*24));
    $('profSince').textContent=`منذ ${created.getDate()} ${MONTHS[created.getMonth()]} ${created.getFullYear()}`;
    $('profSinceChip').style.display='inline-flex';
    $('qsDays').textContent=days||'<1';
  }
  if(user.city){
    $('profCity').textContent=user.city;
    $('profCityChip').style.display='inline-flex';
  }
}

async function loadSwimmers(){
  try{
    const d=await apiCall('/swimmer-auth/my-swimmers');
    swimmers=d.swimmers||[];
    $('qsTotal').textContent=swimmers.length;
    $('qsActive').textContent=swimmers.filter(s=>s.isActive).length;
    render(''); lucide.createIcons();
  }catch(e){
    $('swList').innerHTML=`<div class="no-data"><i data-lucide="wifi-off"></i><p>${e.message}</p></div>`;
    lucide.createIcons();
  }
}

function render(q=''){
  let data=[...swimmers];
  if(q){
    const lq=q.toLowerCase().trim();
    data=data.filter(s=>s.fullName?.toLowerCase().includes(lq)||s.subscriptionId?.toLowerCase().includes(lq));
  }
  const list=$('swList');
  if(!data.length){
    list.innerHTML=`<div class="no-data"><i data-lucide="users"></i><p>${q?`لا نتائج لـ "${q}"`:' لم يُضَف سباحون بعد'}</p><a href="register-swimmer.html" class="add-btn" style="display:inline-flex;font-size:.8rem"><i data-lucide="plus"></i> أضف الآن</a></div>`;
    lucide.createIcons(); return;
  }
  list.innerHTML=data.map(s=>card(s)).join('');
  lucide.createIcons();
}

function card(s){
  const att=s.sessionsAttended||0, tot=s.sessionsCount||1;
  const pct=Math.min(100,Math.round((att/tot)*100));
  const timePart=s.trainingTime
    ?`<span class="sw-time"><i data-lucide="clock"></i>${s.trainingTime}</span>`:'';
  return `
  <div class="sw-card" id="swcard-${s.subscriptionId}">
    <div class="sw-header" onclick="toggleCard('${s.subscriptionId}')">
      <div class="sw-av">${(s.fullName||'?').charAt(0)}</div>
      <div class="sw-info">
        <div class="sw-name">${s.fullName}</div>
        <div class="sw-meta">
          <span class="sw-id">#${s.subscriptionId}</span>
          ${timePart}
        </div>
      </div>
      <div class="sw-right">
        <span class="sw-badge ${s.isActive?'b-on':'b-off'}">${s.isActive?'● نشط':'● منتهي'}</span>
        <div class="chevron-btn">
          <i data-lucide="chevron-down"></i>
        </div>
      </div>
    </div>
    <div class="sw-progress">
      <div class="prog-labels"><span>الحضور: ${att}/${tot}</span><span>${pct}%</span></div>
      <div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="sw-expand" id="expand-${s.subscriptionId}">
      <div class="expand-inner" id="inner-${s.subscriptionId}">
        ${buildExpand(s)}
        <div class="att-section" id="att-${s.subscriptionId}">
          <div class="att-hd"><i data-lucide="calendar-days"></i> سجل الحضور</div>
          <div style="text-align:center;color:var(--tm);font-size:.78rem;padding:12px 0">جاري التحميل...</div>
        </div>
        <div class="sw-actions">
          <button class="act-btn act-edit" onclick="event.stopPropagation();openEdit('${s.subscriptionId}')">
            <i data-lucide="pencil"></i> تعديل بياناتي
          </button>
        </div>
      </div>
    </div>
  </div>`;
}

function buildExpand(s){
  const days=(s.trainingDays||[]).map(d=>DAYS[d]).join('، ')||'—';
  const start=s.subscriptionStart?new Date(s.subscriptionStart):null;
  const daysSince=start?Math.floor((Date.now()-start.getTime())/(1000*60*60*24)):null;
  const sinceStr=start?`انضم ${fmtDate(s.subscriptionStart)}${daysSince!==null?' · منذ '+daysSince+' يوم':''}`:' —';

  const levelHtml=s.level?`
    <div class="level-box">
      <div class="level-num">LV ${s.level}</div>
      <div>
        <div class="level-lbl">المستوى الحالي</div>
        ${s.levelNote?`<div class="level-note">"${s.levelNote}"</div>`:''}
      </div>
    </div>`:'';

  let ratingHtml='<div class="no-rating">لم يُضَف تقييم بعد</div>';
  if(s.rating&&s.rating>0){
    const stars=[1,2,3,4,5].map(i=>`<span class="star${i<=s.rating?' on':''}">★</span>`).join('');
    ratingHtml=`
      <div class="stars-row">${stars}</div>
      ${s.ratingNote?`<div class="rating-note">"${s.ratingNote}"</div>`:''}
      ${s.ratingUpdatedBy?`<div class="rating-by">بواسطة: ${s.ratingUpdatedBy}${s.ratingUpdatedAt?' · '+fmtDate(s.ratingUpdatedAt):''}</div>`:''}`;
  }

  const expHtml=calcExpiry(s);

  return `
    <div class="info-hl"><i data-lucide="calendar-check"></i><span>${sinceStr}</span></div>
    ${expHtml}
    ${levelHtml}
    <div class="rating-box">
      <div class="rating-hd"><i data-lucide="star"></i> تقييم الكابتن</div>
      ${ratingHtml}
    </div>
    <div class="details-grid">
      <div class="det-item"><div class="det-l">العمر</div><div class="det-v">${s.age??'—'} سنة</div></div>
      <div class="det-item"><div class="det-l">الهدف</div><div class="det-v">${GOALS[s.goal]||'—'}</div></div>
      <div class="det-item"><div class="det-l">أيام التدريب</div><div class="det-v" style="font-size:.72rem">${days}</div></div>
      <div class="det-item"><div class="det-l">الهاتف</div><div class="det-v">${s.phone||'—'}</div></div>
      <div class="det-item" style="grid-column:1/-1"><div class="det-l">الكابتن</div><div class="det-v">${s.trainerName||'—'}</div></div>
    </div>`;
}

function calcExpiry(s){
  const att=s.sessionsAttended||0,tot=s.sessionsCount||1;
  if(att>=tot) return `<div class="info-hl err"><i data-lucide="alert-circle"></i><span>انتهت جميع الحصص (${att}/${tot})</span></div>`;
  if(s.subscriptionExpiry){
    const exp=new Date(s.subscriptionExpiry),now=new Date();now.setHours(0,0,0,0);
    const diff=Math.ceil((exp-now)/(1000*60*60*24));
    if(diff<0) return `<div class="info-hl warn"><i data-lucide="calendar-x"></i><span>انتهى الاشتراك في ${fmtDate(s.subscriptionExpiry)}</span></div>`;
    const cls=diff<=7?'ep-over':diff<=30?'ep-warn':'ep-ok';
    const txt=diff===0?'ينتهي اليوم':diff===1?'ينتهي غداً':`ينتهي بعد ${diff} يوم`;
    return `<div class="info-hl"><i data-lucide="calendar"></i><span>انتهاء الاشتراك: ${fmtDate(s.subscriptionExpiry)} <span class="expiry-pill ${cls}">${txt}</span></span></div>`;
  }
  return '';
}

async function toggleCard(subId){
  const card=document.getElementById(`swcard-${subId}`);
  const expand=document.getElementById(`expand-${subId}`);
  const isOpen=expand.classList.contains('open');
  card.classList.toggle('open',!isOpen);
  expand.classList.toggle('open',!isOpen);
  lucide.createIcons();
  if(!isOpen) await loadCalendar(subId);
}

async function loadCalendar(subId){
  const s=swimmers.find(x=>x.subscriptionId===subId);
  if(!s) return;
  if(!calState[subId]){
    const now=new Date();
    calState[subId]={year:now.getFullYear(),month:now.getMonth()+1,statusMap:{}};
  }
  const state=calState[subId];
  const wrap=document.getElementById(`att-${subId}`);
  if(!wrap) return;
  try{
    const d=await apiCall(`/attendance/${subId}/month?year=${state.year}&month=${state.month}`);
    state.statusMap=d.statusMap||{};
    renderCalendar(s,state,wrap);
    lucide.createIcons();
  }catch(e){
    wrap.innerHTML=`<div class="att-hd"><i data-lucide="calendar-days"></i> سجل الحضور</div><div style="color:var(--tm);font-size:.76rem">خطأ في تحميل البيانات</div>`;
  }
}

function renderCalendar(s,state,wrap){
  const {year,month,statusMap}=state;
  const now=new Date();now.setHours(0,0,0,0);
  const todayStr=lds(new Date());
  const firstDOW=new Date(year,month-1,1).getDay();
  const lastDate=new Date(year,month,0).getDate();
  const pad=n=>String(n).padStart(2,'0');
  let present=0,absent=0,makeup=0,html='';

  for(let i=0;i<firstDOW;i++) html+='<div class="cc empty"></div>';

  for(let d=1;d<=lastDate;d++){
    const date=new Date(year,month-1,d),di=date.getDay();
    const ds=`${year}-${pad(month)}-${pad(d)}`;
    const isTD=(s.trainingDays||[]).includes(di);
    const isToday=ds===todayStr;
    const rec=statusMap[ds];
    let cs='rest',ic='';
    if(isTD){
      if(rec?.isMakeup&&rec?.status==='present'){cs='makeup';makeup++;ic='↩';}
      else if(rec?.status==='absent'){cs='absent';absent++;ic='✕';}
      else if(rec?.status==='present'){cs='present';present++;ic='✓';}
      else if(isToday){cs='today-c';ic='●';}
      else{cs='upcoming';}
    }
    html+=`<div class="cc ${cs}"><span class="cc-n">${d}</span>${ic?`<span class="cc-ic">${ic}</span>`:''}</div>`;
  }

  const nowD=new Date();
  const isCurrentMonth=(year===nowD.getFullYear()&&month===nowD.getMonth()+1);
  let remaining=0;
  for(let d=1;d<=lastDate;d++){
    const date=new Date(year,month-1,d),di=date.getDay();
    if(!(s.trainingDays||[]).includes(di)) continue;
    const ds=`${year}-${pad(month)}-${pad(d)}`;
    const rec=statusMap[ds];
    const isFuture=isCurrentMonth?date>=now:date>=new Date(year,month-1,1);
    if(isFuture&&(!rec||rec.status!=='present')) remaining++;
  }

  const subId=s.subscriptionId;
  const nextDisabled=(year===nowD.getFullYear()&&month===nowD.getMonth()+1);

  wrap.innerHTML=`
    <div class="att-hd"><i data-lucide="calendar-days"></i> سجل الحضور</div>
    <div class="att-stats">
      <div class="ast ast-p"><span class="ast-num">${present}</span><span class="ast-lbl">حضر</span></div>
      <div class="ast ast-a"><span class="ast-num">${absent}</span><span class="ast-lbl">غاب</span></div>
      <div class="ast ast-m"><span class="ast-num">${makeup}</span><span class="ast-lbl">تعويضي</span></div>
      <div class="ast ast-r"><span class="ast-num">${remaining}</span><span class="ast-lbl">متبقي</span></div>
    </div>
    <div class="cal-nav">
      <button class="cal-nav-btn" onclick="navCalMonth('${subId}',-1)">›</button>
      <span class="cal-month-lbl">${MONTHS[month-1]} ${year}</span>
      <button class="cal-nav-btn" ${nextDisabled?'disabled':''} onclick="navCalMonth('${subId}',1)">‹</button>
    </div>
    <div class="cal-days-hd">
      ${['أحد','اثنين','ثلا','أربع','خميس','جمعة','سبت'].map(d=>`<div class="cal-day-h">${d}</div>`).join('')}
    </div>
    <div class="cal-grid">${html}</div>`;
  lucide.createIcons();
}

async function navCalMonth(subId,dir){
  const state=calState[subId];if(!state)return;
  state.month+=dir;
  if(state.month<1){state.month=12;state.year--;}
  if(state.month>12){state.month=1;state.year++;}
  const s=swimmers.find(x=>x.subscriptionId===subId);
  const wrap=document.getElementById(`att-${subId}`);
  if(!s||!wrap)return;
  try{
    const d=await apiCall(`/attendance/${subId}/month?year=${state.year}&month=${state.month}`);
    state.statusMap=d.statusMap||{};
    renderCalendar(s,state,wrap);
    lucide.createIcons();
  }catch(e){}
}

function openEdit(subId){
  const s=swimmers.find(x=>x.subscriptionId===subId);
  if(!s)return;
  editId=subId;
  $('e_name').value =s.fullName||'';
  $('e_phone').value=s.phone||'';
  $('e_time').value =s.trainingTime||'';
  $('e_goal').value =s.goal||'';
  $('editModal').classList.add('show');
  lucide.createIcons();
}

async function doSave(){
  if(!editId)return;
  const btn=$('saveBtn');btn.classList.add('loading');$('saveTxt').textContent='جاري الحفظ...';
  try{
    await apiCall(`/swimmer-auth/my-swimmers/${editId}`,'PUT',{
      fullName:    $('e_name').value.trim(),
      phone:       $('e_phone').value.trim(),
      trainingTime:$('e_time').value||'',
      goal:        $('e_goal').value||'',
    });
    $('editModal').classList.remove('show');
    toast('✅ تم تحديث بياناتك','ok');
    await loadSwimmers();
  }catch(e){toast(e.message||'خطأ في التحديث','er');}
  finally{btn.classList.remove('loading');$('saveTxt').textContent='حفظ التعديلات';lucide.createIcons();}
}

function bindUI(){
  $('logoutBtn').onclick=doLogout;
  let st;
  $('swSearch').addEventListener('input',e=>{clearTimeout(st);st=setTimeout(()=>render(e.target.value.trim()),300);});
  $('closeEdit').onclick=()=>$('editModal').classList.remove('show');
  $('editModal').addEventListener('click',e=>e.target===e.currentTarget&&$('editModal').classList.remove('show'));
  $('saveBtn').onclick=doSave;
}

function doLogout(){localStorage.removeItem('sw_token');localStorage.removeItem('sw_user');window.location.href='auth.html';}

async function apiCall(path,method='GET',body=null){
  const h={'Content-Type':'application/json','Authorization':`Bearer ${token}`};
  const o={method,headers:h};if(body)o.body=JSON.stringify(body);
  const r=await fetch(`${API}${path}`,o);
  const d=await r.json().catch(()=>({message:`HTTP ${r.status}`}));
  if(!r.ok){
    if(r.status===401&&path==='/swimmer-auth/my-swimmers')doLogout();
    throw new Error(d.message||`HTTP ${r.status}`);
  }
  return d;
}

function lds(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function fmtDate(d){const dt=new Date(d);return `${dt.getDate()} ${MONTHS[dt.getMonth()]} ${dt.getFullYear()}`;}
function $(id){return document.getElementById(id);}
let toastT;
function toast(msg,type='inf'){const el=$('toast');el.className=`toast ${type} show`;$('toastMsg').textContent=msg;clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('show'),3200);}
</script>
